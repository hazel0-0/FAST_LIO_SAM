common:
    lid_topic:  "/livox/lidar"
    imu_topic:  "/livox/imu"
    gnss_topic:  /ublox_gps_node/fix         #"/imu/data"
    gps_euler_topic: /gps/euler   # NED euler angles (geometry_msgs/Vector3Stamped: x=roll, y=pitch, z=heading)
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 1                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 
    scan_line: 4
 #   scan_rate: 10                # only need to be set for velodyne, unit: Hz,
    blind: 0.5

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic,
   # extrinsic_T: [ 0, 0, 0]
    extrinsic_T: [ 0.366, -0.00, 0.15]
    extrinsic_R: [ 1, 0, 0, 
                   0, 1, 0, 
                   0, 0, 1]
    extrinT_Gnss2Lidar: [ -0.563, 0, -0.00]
    extrinR_Gnss2Lidar: [ 1, 0, 0, 
                          0, 1, 0, 
                          0, 0, 1]
publish:
    path_en:  true
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: true
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.


                                 # voxel filter paprams
odometrySurfLeafSize: 0.5                     # default: 0.4 - outdoor, 0.2 - indoor
mappingCornerLeafSize: 0.2                    # default: 0.2 - outdoor, 0.1 - indoor
mappingSurfLeafSize: 0.5                      # default: 0.4 - outdoor, 0.2 - indoor

# robot motion constraint (in case you are using a 2D robot)
z_tollerance: 1000                            # meters
rotation_tollerance: 1000                     # radians

# CPU Params
numberOfCores: 4                              # number of cores for mapping optimization
mappingProcessInterval: 0.15                  # seconds, regulate mapping frequency

# Surrounding map
surroundingkeyframeAddingDistThreshold: 0.3   # meters, regulate keyframe adding threshold
surroundingkeyframeAddingAngleThreshold: 0.0  # radians, regulate keyframe adding threshold
surroundingKeyframeDensity: 2               # meters, downsample surrounding keyframe poses   
surroundingKeyframeSearchRadius: 50.0         # meters, within n meters scan-to-map optimization (when loop closure disabled)

# Loop closure
loopClosureEnableFlag: true                   # use loopclousre or not 
loopClosureFrequency: 4.0                     # Hz, regulate loop closure constraint add frequency
surroundingKeyframeSize: 80                   # submap size (when loop closure enabled)
historyKeyframeSearchRadius: 5.0             # meters, key frame that is within n meters from current pose will be considerd for loop closure
historyKeyframeSearchTimeDiff: 30.0           # seconds, key frame that is n seconds older will be considered for loop closure
historyKeyframeSearchNum: 50                  # number of hostory key frames will be fused into a submap for loop closure
historyKeyframeFitnessScore: 0.3              # icp threshold, the smaller the better alignment

# GPS Settings
useImuHeadingInitialization: true           # if using GPS data, set to "true"
useGpsElevation: false                      # if GPS elevation is bad, set to "false"
enu_init_en: true
single_antenna_mode: true                   # true: 单天线模式，不接收/gps/euler，通过移动方向估计航向; false: 双天线模式
singleAntenna_minMoveDist: 0.2               # 米, 单天线模式下判定航向所需的最小移动距离
singleAntenna_minMoveSpeed: 0.5              # m/s, 单天线模式下有效航向的最小移动速度
singleAntenna_headingStableCnt: 3            # 连续N次航向一致后才确认航向
singleAntenna_headingStdThresh: 0.15         # rad, 航向稳定性阈值(标准差)，小于此值认为航向收敛
gpsCovThreshold: 0.0002                       # m^2, threshold for using GPS data
poseCovThreshold: 0 #25.0                      # m^2, threshold for using GPS data  位姿协方差阈值 from isam2
gpsNoiseFloor: 0.1                           # m^2, GPS因子最小噪声方差，RTK固定解建议0.01，普通GPS建议1.0
gpsTimeOffset: 0.0                           # 秒, GPS时间偏移，补偿RTK固定延迟（如RTK延迟0.2s则设为-0.2）
gpsSyncTimeThreshold: 0.05                    # 秒, GPS-LiDAR时间匹配窗口（默认0.05，RTK延迟大时适当增大）


# Visualization
globalMapVisualizationSearchRadius: 1000.0    # meters, global map visualization radius
globalMapVisualizationPoseDensity: 10      # meters, global map visualization keyframe density
globalMapVisualizationLeafSize: 1.0           # meters, global map visualization cloud density

# visual iktree_map  
visulize_IkdtreeMap: true

# visual iktree_map  
recontructKdTree: true

# Export settings
savePCD: true                         # https://github.com/TixiaoShan/LIO-SAM/issues/3
savePCDDirectory: "/catkin_fastlio_slam/src/FAST_LIO_SAM/FAST_LIO_SAM/data"        # in your home folder, starts and ends with "/". Warning: the code deletes "LOAM" folder then recreates it. See "mapOptimization" for implementation

# Clean map filter (remove ground, ceiling, robot body)
filter_high_threshold: 0.5        # 全局系下最大高度(m)，高于此值的点被过滤
filter_low_threshold: -0.3        # 全局系下最小高度(m)，低于此值的点被过滤
filter_car_front: 0.5             # 本体系x正方向(前)边界(m)
filter_car_back: -0.5             # 本体系x负方向(后)边界(m)
filter_car_left: 0.3              # 本体系y正方向(左)边界(m)
filter_car_right: -0.3            # 本体系y负方向(右)边界(m)
filter_keypose_radius: 0.5       # keypose周围裁剪半径(m)，以keypose为中心 ±radius 的方框内点被删除
